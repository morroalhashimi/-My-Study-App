<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Study App</title>
    <!-- إعدادات لجعل الويب يفتح كتطبيق آيباد وآيفون أصلي بشاشة كاملة -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="My Study App">

    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #fff; }
        
        /* شريط العناوين والتحكم العلوي */
        header { height: 48px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #334155; }
        .logo { font-weight: bold; color: #38bdf8; font-size: 1.1rem; }
        .actions { display: flex; gap: 10px; }
        .btn { background: #0284c7; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-success { background: #10b981; }

        /* المساحة الرئيسية لتوزيع الملفات واللوحة */
        .workspace { display: flex; width: 100vw; height: calc(100vh - 48px); position: relative; }

        /* أقسام الملفات واللوحة */
        .panel { display: flex; flex-direction: column; background: #1e293b; overflow: hidden; position: relative; }
        .panel-header { padding: 6px 10px; background: #0f172a; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        
        /* فاصل تغيير الحجم */
        .resizer { width: 6px; background: #334155; cursor: col-resize; transition: background 0.2s; }
        .resizer:hover, .resizer:active { background: #38bdf8; }

        iframe.viewer { width: 100%; height: 100%; border: none; background: #fff; }

        /* لوحة الرسم بقلم أبل (Scratchpad) */
        canvas#canvasBoard { width: 100%; height: 100%; background: #0f172a; touch-action: none; cursor: crosshair; }

        /* نافذة يوتيوب العائمة */
        #ytWindow { position: absolute; z-index: 9999; top: 60px; right: 20px; width: 340px; height: 220px; background: #1e293b; border: 2px solid #38bdf8; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; resize: both; overflow: hidden; min-width: 200px; min-height: 140px; }
        #ytHeader { padding: 6px 10px; background: #0f172a; cursor: move; font-size: 0.8rem; color: #38bdf8; font-weight: bold; display: flex; justify-content: space-between; user-select: none; }
        #ytIframe { width: 100%; flex: 1; border: none; }

        /* شريط الذكاء الاصطناعي السريع */
        .ai-drawer { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 60%; background: #1e293b; border: 1px solid #38bdf8; border-radius: 12px; padding: 8px; display: flex; gap: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); z-index: 8000; }
        .ai-drawer input { flex: 1; background: #0f172a; border: 1px solid #475569; color: #fff; border-radius: 6px; padding: 6px 10px; outline: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚡ My Study App</div>
        <div class="actions">
            <button class="btn" onclick="toggleSplit()">↔️ تقسيم / إلغاء تقسيم الشاشة</button>
            <button class="btn btn-success" onclick="clearCanvas()">🧹 مسح لوحة القلم</button>
        </div>
    </header>

    <div class="workspace" id="workspace">
        
        <!-- القسم الأول: الكتاب أو الملزمة الأولى -->
        <div class="panel" id="panel1" style="flex: 1;">
            <div class="panel-header">
                <span>📄 الملف الأول (الكتاب)</span>
                <input type="file" accept="application/pdf" onchange="loadPdf(event, 'frame1')" style="font-size:0.75rem;">
            </div>
            <iframe id="frame1" class="viewer" src="about:blank"></iframe>
        </div>

        <div class="resizer" id="resizer1"></div>

        <!-- القسم الثاني: الملزمة الثانية أو نفس الملف -->
        <div class="panel" id="panel2" style="flex: 1;">
            <div class="panel-header">
                <span>📄 الملف الثاني (الملزمة / مقارنة)</span>
                <input type="file" accept="application/pdf" onchange="loadPdf(event, 'frame2')" style="font-size:0.75rem;">
            </div>
            <iframe id="frame2" class="viewer" src="about:blank"></iframe>
        </div>

        <div class="resizer" id="resizer2"></div>

        <!-- القسم الثالث: مساحة خطوات الحل وتدوين الملاحظات بقلم أبل -->
        <div class="panel" id="panel3" style="flex: 0.8;">
            <div class="panel-header">
                <span>✏️ مسودة الحلول (قلم أبل)</span>
            </div>
            <canvas id="canvasBoard"></canvas>
        </div>

    </div>

    <!-- نافذة يوتيوب العائمة فوق الشاشة -->
    <div id="ytWindow">
        <div id="ytHeader">
            <span>📺 يوتيوب عائم (اسحبني)</span>
            <small style="color:#94a3b8;">📐 كبّر من الزاوية</small>
        </div>
        <div style="padding: 4px; display: flex; gap: 4px; background: #1e293b;">
            <input type="text" id="ytUrl" placeholder="رابط فيديو الشرح..." style="flex: 1; background: #0f172a; color: #fff; border: 1px solid #475569; border-radius: 4px; font-size: 0.75rem; padding: 2px 5px;">
            <button onclick="playYoutube()" style="background: #0284c7; color: #fff; border: none; border-radius: 4px; font-size: 0.75rem; padding: 2px 8px;">تشغيل</button>
        </div>
        <iframe id="ytIframe" src="https://www.youtube.com/embed/" allowfullscreen></iframe>
    </div>

    <!-- شريط الذكاء الاصطناعي الفائق السرعة -->
    <div class="ai-drawer">
        <input type="text" id="aiPrompt" placeholder="اسأل الذكاء الاصطناعي أي سؤال أو اطلب شرح خطوة..." onkeydown="if(event.key==='Enter') askAI()">
        <button class="btn btn-success" onclick="askAI()">🚀 إرسال</button>
    </div>

    <script>
        // 1. فتح ملفات الـ PDF
        function loadPdf(e, frameId) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById(frameId).src = URL.createObjectURL(file);
            }
        }

        // 2. إلغاء / تفعيل تقسيم الشاشة الداخلي
        function toggleSplit() {
            const p2 = document.getElementById('panel2');
            const r1 = document.getElementById('resizer1');
            if (p2.style.display === 'none') {
                p2.style.display = 'flex';
                r1.style.display = 'block';
            } else {
                p2.style.display = 'none';
                r1.style.display = 'none';
            }
        }

        // 3. دعم رسم واستجابة قلم أبل على اللوحة (Canvas)
        const canvas = document.getElementById('canvasBoard');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 500);

        canvas.addEventListener('pointerdown', (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('pointermove', (e) => { if (drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
        canvas.addEventListener('pointerup', () => drawing = false);

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // 4. تحريك نافذة يوتيوب العائمة باللمس أو القلم
        const ytWin = document.getElementById('ytWindow');
        const ytHead = document.getElementById('ytHeader');
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        ytHead.addEventListener('pointerdown', (e) => {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
            active = true;
        });
        document.addEventListener('pointermove', (e) => {
            if (active) {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                ytWin.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        });
        document.addEventListener('pointerup', () => active = false);

        function playYoutube() {
            const url = document.getElementById('ytUrl').value;
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const m = url.match(reg);
            if (m && m[2].length == 11) {
                document.getElementById('ytIframe').src = "https://www.youtube.com/embed/" + m[2];
            }
        }

        // 5. ربط الذكاء الاصطناعي
        async function askAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) return;
            alert("🪄 الذكاء الاصطناعي يعمل الآن على معالجة سؤالك:\n\n" + prompt);
        }
    </script>
</body>
</html>
